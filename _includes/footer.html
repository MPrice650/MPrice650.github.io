<footer>
  <span>© {{ 'now' | date: "%Y" }} {{ site.author | default: "Your Name" }}</span>
  <span style="font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em;">
    Built with Jekyll · Hosted on GitHub Pages
  </span>
  <span>
    {% if site.github %}
      <a href="https://github.com/{{ site.github }}" target="_blank" style="color: var(--muted); transition: color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">GitHub ↗</a>
    {% endif %}
  </span>
</footer>
